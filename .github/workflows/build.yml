name: Compilar DSK SFz Player

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Compilar para Windows'
        required: true
        default: 'true'
        type: boolean
      build_macos:
        description: 'Compilar para macOS'
        required: true
        default: 'true'
        type: boolean
      build_linux:
        description: 'Compilar para Linux'
        required: true
        default: 'true'
        type: boolean

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            enabled: ${{ inputs.build_windows }}
          - os: macos-latest
            enabled: ${{ inputs.build_macos }}
          - os: ubuntu-latest
            enabled: ${{ inputs.build_linux }}
            
    runs-on: ${{ matrix.os }}
    if: ${{ matrix.enabled == true }}
    
    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Instalar dependencias (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libx11-dev libxcursor-dev libxinerama-dev libxext-dev libfreetype6-dev libxrandr-dev libxcomposite-dev libxrender-dev

    - name: Configurar CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Compilar
      run: cmake --build build --config Release

    - name: Subir artefactos
      uses: actions/upload-artifact@v4
      with:
        name: DSK-SFz-Player-${{ matrix.os }}
        path: |
          build/**/*VST3*
          build/**/*Standalone*