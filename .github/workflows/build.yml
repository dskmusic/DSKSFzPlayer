name: Compilar DSK SFz Player

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Compilar VST3 Windows'
        required: true
        default: false
        type: boolean
      build_windows_standalone:
        description: 'Compilar Standalone Windows'
        required: true
        default: false
        type: boolean
      build_macos:
        description: 'Compilar macOS'
        required: true
        default: false
        type: boolean
      build_linux:
        description: 'Compilar Linux'
        required: true
        default: false
        type: boolean
      create_release:
        description: 'Crear Release automática (Subir archivos)'
        required: true
        default: false
        type: boolean
      release_notes:
        description: 'Notas de la versión'
        required: false
        default: 'Actualización automática de versión.'
        type: string

jobs:
  build-windows:
    if: ${{ inputs.build_windows || inputs.build_windows_standalone }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Configurar y Compilar
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      - name: Subir artefactos Windows
        uses: actions/upload-artifact@v4
        with:
          name: DSK-SFz-Player-Windows
          path: |
            ${{ inputs.build_windows && 'build/DSKSFzPlayer_artefacts/Release/VST3/*' || '' }}
            ${{ inputs.build_windows_standalone && 'build/DSKSFzPlayer_artefacts/Release/Standalone/*' || '' }}

  build-macos:
    if: ${{ inputs.build_macos }}
    # Se usa macos-14 para evitar el error de compilación en macOS 15
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Configurar y Compilar
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      - name: Subir artefactos macOS
        uses: actions/upload-artifact@v4
        with:
          name: DSK-SFz-Player-macOS
          path: build/DSKSFzPlayer_artefacts/Release/*/*

  build-linux:
    if: ${{ inputs.build_linux }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Instalar dependencias
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libx11-dev libxcursor-dev libxinerama-dev libxext-dev libfreetype6-dev libxrandr-dev libxcomposite-dev libxrender-dev
      - name: Configurar y Compilar
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      - name: Subir artefactos Linux
        uses: actions/upload-artifact@v4
        with:
          name: DSK-SFz-Player-Linux
          path: build/DSKSFzPlayer_artefacts/Release/*/*

  release:
    needs: [build-windows, build-macos, build-linux]
    if: ${{ inputs.create_release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar todos los artefactos
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true
      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ inputs.release_notes }}
          files: release-files/*
          tag_name: v1.0.${{ github.run_number }}
          generate_release_notes: false